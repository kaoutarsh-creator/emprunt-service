<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Emprunt Service</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="card auth-card">
      <h1>Login</h1>
      <p>Connectez-vous pour accéder au système d'emprunt.</p>

      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="admin@test.com" required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="123456" required />
        </div>

        <button type="submit">Se connecter</button>
      </form>

      <div id="message"></div>

      <div class="center-links">
        <a href="./register.html">Créer un compte</a>
      </div>
    </div>
  </div>

  <script src="./js/login.js"></script>
</body>
</html>
