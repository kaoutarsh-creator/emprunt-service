<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Emprunts</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <div class="navbar">
    <div class="nav-content">
      <h2>Emprunt Service</h2>
      <div class="actions">
        <a href="./dashboard.html">Dashboard</a>
        <button id="logoutBtn">Logout</button>
      </div>
    </div>
  </div>

  <div class="container">

    <div class="card">
      <h2>Ajouter un emprunt</h2>

      <form id="empruntForm">
        <input type="text" id="idClient" placeholder="ID Client" required />
        <input type="text" id="idLivre" placeholder="ID Livre" required />
        <button type="submit">Ajouter</button>
      </form>

      <div id="message"></div>
    </div>

    <div class="card">
      <h2>Liste des emprunts</h2>

      <table>
        <thead>
          <tr>
            <th>Client</th>
            <th>Livre</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="empruntTable"></tbody>
      </table>
    </div>

  </div>

  <script src="./js/emprunt.js"></script>
</body>
</html>
