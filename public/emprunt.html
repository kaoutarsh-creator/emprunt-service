<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emprunts - Emprunt Service</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="navbar">
    <div class="nav-content">
      <h2>Gestion des emprunts</h2>
      <div class="actions">
        <a href="./dashboard.html">Dashboard</a>
        <a href="./emprunt.html">Emprunts</a>
        <button class="logout-btn" id="logoutBtn">Logout</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="grid">
      <div class="card">
        <h2>Ajouter un emprunt</h2>
        <form id="empruntForm">
          <div class="form-group">
            <label>ID Client</label>
            <input type="text" id="idClient" required />
          </div>

          <div class="form-group">
            <label>ID Livre</label>
            <input type="text" id="idLivre" required />
          </div>

          <button type="submit">Ajouter</button>
        </form>

        <div id="message"></div>
      </div>

      <div class="card">
        <h2>Rechercher les emprunts d'un client</h2>
        <div class="form-group">
          <label>ID Client</label>
          <input type="text" id="searchClientId" />
        </div>
        <button id="searchBtn">Rechercher</button>

        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Livre</th>
              <th>Statut</th>
            </tr>
          </thead>
          <tbody id="empruntTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="./js/emprunt.js"></script>
</body>
</html>
